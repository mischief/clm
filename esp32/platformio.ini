; PlatformIO project for the ESP32 port of libclm.
;
; The desktop tree (meson build, src/ CLI+TUI) is untouched; this drives an
; ESP-IDF build of the libclm core. Firmware sources live in firmware/ so they
; do not collide with the desktop src/. libclm is an ESP-IDF component under
; components/, built against ESP-IDF's own built-in cJSON ("json" component)
; rather than a vendored JSON library.
;
; Target hardware: LilyGo T-Deck (ESP32-S3-WROOM-1 N16R8: 16MB flash, 8MB octal
; PSRAM), via the custom board in boards/t-deck.json.
[platformio]
src_dir = firmware

[env:t-deck]
platform = espressif32@6.12.0
board = t-deck
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags = -DBOARD_TDECK
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0

[env:cardputer]
platform = espressif32@6.12.0
board = cardputer
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
; espressif32 hardcodes sdkconfig.defaults, so steer IDF at ours (no PSRAM)
; via SDKCONFIG_DEFAULTS instead.
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS=sdkconfig.cardputer.defaults
build_flags = -DBOARD_CARDPUTER
upload_port = /dev/ttyACM1
monitor_port = /dev/ttyACM1
