; PlatformIO project for the ESP32 port of libclm.
;
; The desktop tree (meson build, src/ CLI+TUI) is untouched; this drives an
; ESP-IDF build of the libclm core. Firmware sources live in firmware/ so they
; do not collide with the desktop src/. libclm + vendored json-c are ESP-IDF
; components under components/.
;
; Target hardware: LilyGo T-Deck (ESP32-S3-WROOM-1 N16R8: 16MB flash, 8MB octal
; PSRAM), via the custom board in boards/t-deck.json.
[platformio]
src_dir = firmware

[env:t-deck]
platform = espressif32@6.12.0
board = t-deck
framework = espidf
monitor_speed = 115200
board_build.partitions = partitions.csv
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
; No build_flags needed: the core is transport/subprocess-free by construction
; (the libuv/libcurl/shell files are simply not compiled by the component).
